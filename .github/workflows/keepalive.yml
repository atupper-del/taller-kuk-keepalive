name: Supabase Keepalive

on:
  schedule:
    - cron: '0 13 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          curl -sS -o /dev/null -w "Supabase respondió con código: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Registrar ejecución (evita que GitHub desactive el cron por inactividad)
        run: |
          echo "Última ejecución: $(date -u)" > last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-run.txt
          git commit -m "Keepalive: $(date -u +%F)" || echo "nada que commitear"
          git push
